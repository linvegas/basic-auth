{{template "base" .}}

{{define "title"}}User - Basic Auth{{end}}

{{define "styles"}}
<style>
header {
    background-color: var(--color-bg-ll);

    & h1 > a {
        color: inherit;
        text-decoration: none;
    }
}

div.wrapper.header {
    padding-block: 0.35rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

main {
    margin-top: 3rem;
    h2 { margin-bottom: 1.5rem; }
    p { margin-bottom: 1rem; }
}
</style>
{{end}}

{{define "content"}}
<header>
    <div class="wrapper header">
        <h1><a href="/">Basic Auth</a></h1>
        <nav>
            <a href="/logout" id="logoutAnchor" class="btn">Logout</a>
        </nav>
    </div>
</header>
<main>
    <div class="wrapper">
        <h2>Welcome to your page, {{.Login}}</h2>
        <p>You are just a normal user!</p>
    </div>
</main>
{{end}}

{{define "scripts"}}
<script>
    logoutAnchor.addEventListener("click", async ev => {
        ev.preventDefault()
        const res = await fetch("/logout", { method: "POST" })
        if (res.ok) window.location.href = "/"
    })
</script>
{{end}}
